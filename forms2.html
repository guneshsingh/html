<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JOB application</h2>
    <form>
        <label for="name1">NAME:</label>
        <input type="name" id="name1" name="name1">
        <br><br>
        <label for="email1">EMAIL ID:</label>
        <input type="email" id="email1" name="email1">
        <br><br>
        <label for="tele1">PHONE:</label>
        <input type="tel" id="tele1" name="tele1">
        <br><br>
        <label for="file1">RESUME:</label><br>
        <input type="file" id="file1" name="file1">
        <br><br>
        <label for="num1">Experience(years):</label>
        <input type="number" id="num1" max="50" min="0">
        <fieldset>
            <legend>SKILLS</legend>
        <input type="checkbox" id="c1"><br>
        <label for="c1">HTML:</label>
        <br>
        <input type="checkbox" id="c2"><br>
        <label for="c2">CSS:</label>
        <br>
        <input type="checkbox" id="c3"><br>
        <label for="c3">java:</label>
        <br>
        </fieldset>
        <br><br>
        <label for="skill1">HIGHER EDUCATION:
        </label><br>
        <select name="skill1" id="skill1">
                <option value="skill1">High school</option>
                <option value="skill1">CSS</option>
                <option value="skill1">JAVA</option>
            </select>
        <br>
        <fieldset>
            <legend>AVAILBILITY</legend>
            <label for="r1">FULL TIME</label>
            <br>
            <input type="radio" name="r1" id="r1">
            <br><br>
            <label for="r2">HALF TIME</label>
            <br>
            <input type="radio" name="r1" id="r2">
            <br><br>
        </fieldset>
        <label for="t1">ADDITIONAL COMMENTS</label>
        <br>
        <textarea name="t1" id="t1" cols="20" rows="20"></textarea>
    <br><input type="submit" >    
    </form>
</body>
</html>
